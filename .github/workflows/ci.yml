name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - "tests/**"
      - "cmake/**"
      - "vc18/**"
      - "vcpkg.json"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "cmake/**"
      - "vc18/**"
      - "vcpkg.json"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Fast Checks
    permissions:
      contents: read
      checks: write
      pull-requests: read
    uses: ./.github/workflows/reusable-checks.yml
    secrets: inherit

  tests-lua:
    name: Lua Syntax
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-tests-lua.yml
    secrets: inherit

  build-windows:
    name: Build - Windows
    needs: [checks, tests-lua]
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/reusable-build-windows.yml
    secrets: inherit
